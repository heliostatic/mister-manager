name: CI

# Least-privilege: this workflow only reads the repo (checkout) and runs
# tests. No write scopes needed.
permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run shellcheck
        # --severity=error gates on real bugs only. Pre-existing style
        # warnings (SC2155 declare-and-assign, SC2059 ANSI vars in printf
        # format, SC2088 tilde-in-quoted-display-string) are intentional
        # patterns in this codebase. Tighten to `warning` once those are
        # either fixed or explicitly disabled in .shellcheckrc.
        run: |
          shellcheck --severity=error -s bash \
            script/bootstrap script/secrets script/brew-audit \
            script/sort-brewfile script/lib.sh script/symlink \
            script/takeover script/secrets-setup test/smoke.sh

  smoke-bash-3-2:
    name: Smoke (bash 3.2 / macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install GNU coreutils (smoke suite uses `timeout`)
        # macOS doesn't ship `timeout`; homebrew's coreutils installs it
        # as `gtimeout` by default. The `libexec/gnubin` path provides
        # un-prefixed names. Idempotent if coreutils is pre-installed on
        # the runner image.
        run: brew install coreutils
      - name: Assert /bin/bash is 3.2
        # Fail loudly if Apple ever ships a newer bash by default — the
        # whole point of this job is the 3.2 compat gate.
        run: |
          /bin/bash --version | head -1
          /bin/bash --version | head -1 | grep -q 'version 3\.2\.' \
            || { echo "Expected /bin/bash to be 3.2; got something else"; exit 1; }
      - name: Run smoke tests
        # Prepend /bin so `env bash` in subscript shebangs resolves to
        # Apple's frozen-at-3.2.57 system bash. Prepend coreutils gnubin
        # so `timeout` (and friends) resolve without the `g` prefix.
        run: |
          GNUBIN="$(brew --prefix coreutils)/libexec/gnubin"
          PATH="$GNUBIN:/bin:$PATH" /bin/bash test/smoke.sh

  smoke-bash-5:
    name: Smoke (bash 5.x / Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Show bash version
        run: bash --version | head -1
      - name: Run smoke tests
        run: ./test/smoke.sh
